---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json      - firefox-langpacks
      - libreoffice-core
      - libreoffice-calc
      - libreoffice-draw
      - libreoffice-impress
      - libreoffice-writer
      - libreoffice-langpack-en
name: intr-bzte-os
description: Enter AMD/Intel KDE Bazzite based fork with Bloatware Removed

base-image: ghcr.io/ublue-os/bazzite
image-version: stable 

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: rpm-ostree
    install:
      - discord
      - steam
      - mangohud
      - fastfetch
      - python3.14
      - docker-ce    
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      
    remove:
      - firefox
      - firefox-langpacks
      - libreoffice-core
      - libreoffice-calc
      - libreoffice-draw
      - libreoffice-impress
      - libreoffice-writer
      - libreoffice-langpack-en
      - kpat
      - kmahjongg
      - kmines
      - kaddressbook
      - korganizer
      - khelpcenter
      - krdc
      - krfb

  - type: default-flatpaks
    notify: true
    system:
      install:
        - org.mozilla.firefox
        - org.vinegarhq.Sober
        - com.usebottles.bottles
        - org.videolan.VLC
        - com.spotify.Client
      remove:
        - org.kde.elisa

  - type: script
    scripts:
      - plymouth-set-default-theme bazzite -R
      - chmod +x /usr/bin/clean-system
      - systemctl enable battery-limit.service

  - type: signing
